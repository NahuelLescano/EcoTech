<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio - Eco Tech</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bulma/1.0.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <header>
      <nav
        class="navbar is-primary"
        role="navigation"
        aria-label="main navigation"
      >
        <div class="container">
          <div class="navbar-brand">
            <a
              class="navbar-item has-text-weight-bold is-size-4"
              href="index.html"
              >Eco Tech</a
            >
            <button
              class="navbar-burger"
              aria-label="menu"
              aria-expanded="false"
              data-target="main-navbar"
            >
              <span aria-label="true"></span>
              <span aria-label="true"></span>
              <span aria-label="true"></span>
              <span aria-label="true"></span>
            </button>
          </div>
          <div id="main-navbar" class="navbar-menu">
            <div class="navbar-start">
              <a class="navbar-item is-active" href="index.html">Inicio</a>
              <a class="navbar-item" href="depositosResiduos.html"
                >Despositos</a
              >
              <a class="navbar-item" href="logistica.html"
                >Panel de Logistica</a
              >
              <a class="navbar-item" href="auditoria.html"
                >Dashboard de Auditoria</a
              >
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <h1 class="title">Bienvenido a EcoTech</h1>
          <p class="subtitle">
            Selecciona una opcion en el menu superior para comenzar.
          </p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="content has-text-centered">
        <p>
          <strong>EcoTech</strong> - Trabajo Practico Integrador. Grupo 404 not
          found.
        </p>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const burger = document.querySelector(".navbar-burger");
        const menu = document.getElementById(burger.dataset.target);

        burger.addEventListener("click", () => {
          burger.classList.toggle("is-active");
          menu.classList.toggle("is-active");
        });
      });
    </script>
  </body>
</html>
