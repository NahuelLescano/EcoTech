<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Logistica - EcoTech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />
    <script type="module" defer src="js/logistica.js"></script>
</head>

<body class="is-flex is-flex-direction-column" style="min-height: 100vh;">
    <header>
        <nav class="navbar is-primary" aria-label="main navigation">
            <div class="container is-fluid">
                <div class="navbar-brand">
                    <a class="navbar-item has-text-weight-bold is-size-4" href="index.html">
                        Eco Tech<i class="fa-solid fa-leaf"></i>
                    </a>
                    <button class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="main-navbar">
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                    </button>
                </div>
                <div id="main-navbar" class="navbar-menu">
                    <div class="navbar-end">
                        <a class="navbar-item has-text-weight-bold" href="index.html">Inicio</a>
                        <a class="navbar-item has-text-weight-bold" href="depositosResiduos.html">Depositos</a>
                        <a class="navbar-item is-active has-text-weight-bold" href="logistica.html">Panel de
                            Logistica</a>
                        <a class="navbar-item has-text-weight-bold" href="ordenes-retiro.html">Ordenes de retiro</a>
                        <a class="navbar-item has-text-weight-bold" href="auditoria.html">Dashboard de Auditoria</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="is-flex-grow-1">
        <section class="section">
            <div class="container is-fluid">
                <header class="has-text-centered mb-5">
                    <h1 class="title is-2 mb-2">
                        <i class="fa-solid fa-truck-ramp-box has-text-primary mr-3"></i>Panel de Logística
                    </h1>
                    <p class="subtitle is-5 has-text-grey">
                        Gestión de rutas y recolección inteligente de contenedores.
                    </p>
                </header>

                <hr class="has-background-light mb-6" />

                <div id="loading" class="has-text-centered">
                    <p>Cargando contenedores...</p>
                </div>

                <div id="sin-ordenes" class="notification is-info is-hidden">
                    <p><i class="fa-solid fa-inbox mr-2"></i>No hay contenedores registrados.</p>
                </div>

                <div id="contenedores-grid" class="columns is-multiline"></div>

                <div id="notificacion" class="notification is-hidden mt-4">
                    <button class="delete"></button>
                    <p id="notificacion-texto"></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer is-flex is-align-items-center is-justify-content-center" style="height: 50px;">
        <div class="content has-text-centered m-0">
            <p><strong>EcoTech</strong> - Trabajo Practico Integrador. Grupo 404 not found.</p>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const burger = document.querySelector(".navbar-burger");
            const menu = document.getElementById(burger.dataset.target);

            burger.addEventListener("click", () => {
                burger.classList.toggle("is-active");
                menu.classList.toggle("is-active");
            });
        });
    </script>
</body>

</html>
